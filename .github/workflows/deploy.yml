name: Deploy to Amazon ECR and ECS

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: my-nginx-repo
  ECS_SERVICE: my-nginx-service
  ECS_CLUSTER: my-ec2-ecs-cluster
  ECS_TASK_DEFINITION_NAME: my-nginx-task

jobs:
  deploy:
    name: Build, Push and Deploy
    runs-on: ubuntu-latest

    steps:
    # 1. GitHub Repository se code pull karna
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. AWS Credentials set karna (Jo humne GitHub Secrets mein dale hain)
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    # 3. AWS ECR Registry par login karna
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    # 4. Agar Dockerfile nahi hai toh automated Dockerfile ready karna
    - name: Setup Dockerfile if missing
      run: |
        if [ ! -f Dockerfile ]; then
          echo "FROM nginx:latest" > Dockerfile
          echo "<h1>Hello Syed Jazib - Deployed via GitHub Actions Scenario 32</h1>" > /usr/share/nginx/html/index.html
        fi

    # 5. Image build karna aur AWS ECR par push karna
    - name: Build, tag, and push image to Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: latest
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

    # 6. ECS Service ko force update karna takay naya container deploy ho jaye
    - name: Deploy to Amazon ECS
      run: |
        aws ecs update-service --cluster ${{ env.ECS_CLUSTER }} --service ${{ env.ECS_SERVICE }} --force-new-deployment --region ${{ env.AWS_REGION }}
