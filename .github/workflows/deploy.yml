name: Deploy to Amazon ECR and ECS

on:
  push:
    branches:
      - main  # Jab bhi aap main branch par push karenge, pipeline khud chal paregi

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: my-nginx-repo
  ECS_SERVICE: my-nginx-service
  ECS_CLUSTER: my-ec2-ecs-cluster  # Jo cluster aapka chal raha hai
  ECS_TASK_DEFINITION: my-nginx-task

jobs:
  deploy:
    name: Build, Push and Deploy
    runs-on: ubuntu-latest

    steps:
    # 1. Code checkout karna
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. AWS Credentials configure karna
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    # 3. AWS ECR par login karna
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, tag, and push image to Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: latest
      run: |
        # Agar aapke paas repository mein Dockerfile nahi hai, toh yeh pipeline khud bana degi:
        if [ ! -f Dockerfile ]; then
          echo "FROM nginx:latest" > Dockerfile
          echo "<h1>Hello Syed Jazib - Deployed via GitHub Actions Scenario 32</h1>" > /usr/share/nginx/html/index.html
        fi
        
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

    # 5. ECS Service ko automatic update karna new image ke sath
    - name: Deploy Amazon ECS task definition
      run: |
        aws ecs update-service --cluster ${{ env.ECS_CLUSTER }} --service ${{ env.ECS_SERVICE }} --force-new-deployment --region ${{ env.AWS_REGION }}
